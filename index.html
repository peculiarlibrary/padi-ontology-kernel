<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>PADI Sovereign Bureau | Visualizer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #0d1117; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        #overlay {
            position: absolute; top: 20px; left: 20px; color: #58a6ff;
            pointer-events: none; text-shadow: 1px 1px 2px #000;
            z-index: 10;
        }
        /* Ensure the SVG fills the entire screen */
        svg { width: 100vw; height: 100vh; display: block; }
    </style>
</head>
<body>
    <div id="overlay">
        <h1 style="margin:0;">PADI Sovereign Bureau</h1>
        <p id="node-status" style="margin:5px 0;">Node: Peculiar Librarian | Kernel: Synchronized</p>
    </div>
    
    <svg id="visualizer-container"></svg>

    <script src="app.js"></script>
</body>
</html>
