concurrency:
  group: "pages"
  cancel-in-progress: false
name: PADI Bureau Integrity Audit

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Sovereign Kernel
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Add any necessary RDF libs here later

    - name: Run Smart Auditor
      run: |
        # We point the Auditor at the repository files
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        python agents/auditor.py
