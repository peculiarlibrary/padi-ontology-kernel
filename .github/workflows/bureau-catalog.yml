name: PADI Bureau Auto-Cataloger

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'manifest.json' # Avoid infinite loops

jobs:
  catalog:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push manifest changes back

    steps:
    - name: Checkout Kernel
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Run Cataloger Agent
      run: |
        export PYTHONPATH=$PYTHONPATH:$(pwd)
        python agents/cataloger.py

    - name: Commit Updated Manifest
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "PADI Cataloger Bot"
        git add manifest.json
        git commit -m "chore: automated manifest update [skip ci]" || echo "No changes to commit"
        git push
