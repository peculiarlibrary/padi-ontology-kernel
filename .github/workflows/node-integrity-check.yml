name: Node integrity check

on:
  push:
    branches: [ main ]

jobs:
  verify-manifest:
    name: Verify manifest and assets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install tools
        run: |
          sudo apt-get update -y
          sudo apt-get install -y jq gnupg openssl

      - name: Ensure verify script is executable
        run: chmod +x ./verify-node.sh

      - name: Import PEM public key from secret
        if: ${{ secrets.LIBRARIAN_PUB != '' }}
        run: |
          echo "${{ secrets.LIBRARIAN_PUB }}" > ./librarian_public.pem
          chmod 600 ./librarian_public.pem

      - name: Import GPG public key from secret
        if: ${{ secrets.LIBRARIAN_PUB_GPG != '' }}
        run: |
          echo "${{ secrets.LIBRARIAN_PUB_GPG }}" > ./librarian_public.gpg
          gpg --import ./librarian_public.gpg

      - name: Fail if manifest or signature missing
        run: |
          if [ ! -f manifest.json ]; then echo "manifest.json not found"; exit 1; fi
          if [ ! -f manifest.sig ]; then echo "manifest.sig not found"; exit 1; fi

      - name: Run node verification
        env:
          LIBRARIAN_PUB: ./librarian_public.pem
          LIBRARIAN_PUB_GPG: ./librarian_public.gpg
        run: |
          ./verify-node.sh manifest.json manifest.sig
